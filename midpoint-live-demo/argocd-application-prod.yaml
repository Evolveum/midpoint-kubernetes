apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-renaissance
  namespace: argocd
spec:
  project: midpoint-demo
  source:
    repoURL: https://github.com/Evolveum/midpoint-kubernetes.git
    targetRevision: main
    path: midpoint-live-demo/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: midpoint-demo-renaissance
  syncPolicy:
    automated: {}
